name: Test prefixd
run-name: PR ${{ github.event.pull_request.number }} triggered by @${{ github.actor }}

permissions:
  contents: write

on:
  workflow_call:
  pull_request:
    branches:
      - main
    paths-ignore:
      - '.github/workflows/**'
      - 'README.md'
jobs:
  test:
    name: Test prefixd
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: 'go.sum'
          # Cache doesnt share upwards between PRs and main branch builds
          # cache: ${{ github.event_name != 'pull_request' }}
          cache: false

      - name: Test
        run: make test
        shell: bash

      - name: Upload Test Coverage Report
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.html
          compression-level: 0
